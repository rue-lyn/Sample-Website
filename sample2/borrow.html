<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borrow Equipment - School Equipment System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">School Equipment</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="help.html">Help</a></li>
            </ul>
        </div>
    </nav>

    <!-- Borrow Form -->
    <div class="container">
        <div class="form-container">
            <h2 class="page-title">Borrow Equipment</h2>
            <form action="return.html">
                <div class="form-group">
                    <label for="student_name">Student Name</label>
                    <input type="text" id="student_name" name="student_name" required placeholder="Enter your full name">
                </div>
                
                <div class="form-group">
                    <label for="student_id">Student ID</label>
                    <input type="text" id="student_id" name="student_id" required placeholder="Enter your student ID">
                </div>
                
                <div class="form-group">
                    <label for="equipment">Select Equipment</label>

                    <select id="equipment" name="equipment" required>
    
                        <option value="">-- Choose Equipment --</option>
                        <option value="football">Football</option>
                        <option value="basketball">Basketball</option>
                        <option value="volleyball">Volleyball</option>
                        <option value="badminton">Badminton Set</option>
                        <option value="cricket">Cricket Kit</option>
                        <option value="tennis">Tennis Racket</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="quantity">Quantity</label>
                    <input type="number" id="quantity" name="quantity" min="1" max="10" required>
                </div>
                
                <div class="form-group">
                    <label for="borrow_date">Borrow Date</label>
                    <input type="date" id="borrow_date" name="borrow_date" required>
                </div>
                
                <div class="form-group">
                    <label for="return_date">Return Date</label>
                    <input type="date" id="return_date" name="return_date" required>
                </div>
                
                <div class="form-group">
                    <label for="purpose">Purpose</label>
                    <textarea id="purpose" name="purpose" rows="3" placeholder="Describe the purpose of borrowing the equipment"></textarea>

                <button type="submit" class="btn-submit">Submit Borrow Request</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
